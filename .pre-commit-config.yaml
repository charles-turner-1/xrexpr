repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 'v0.12.10'
    hooks:
      - id: ruff
        args: ['--fix']
  
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
    - id: black
      language_version: python3
  - repo: local
    hooks:
    - id: mypy
      name: mypy
      # Run the project's mypy in the pixi env (so xarray/numpy/frozendict resolve)
      # against the [tool.mypy] config, i.e. exactly `mypy src`. pass_filenames is
      # off so pre-commit does not override files="src" with the changed paths.
      entry: pixi run -e default mypy
      language: system
      types: [python]
      pass_filenames: false
      require_serial: true
